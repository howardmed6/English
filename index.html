<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- BARRA SUPERIOR -->
  <div class="topbar">
    <label>Video: <input type="file" id="video-input" accept="video/*" /></label>
    <label>SRT: <input type="file" id="srt-input" accept=".srt" /></label>
    <button class="btn-seek" id="btn-back10">← 10s</button>
    <button class="btn-seek" id="btn-fwd10">10s →</button>
    <button class="btn-sync" id="btn-sync">⇄ Sincronizar</button>
  </div>

  <!-- BARRA DE DESFASE INICIAL -->
  <div class="offset-bar" id="offset-bar">
    <span class="offset-label">Desfase inicial (por intros antes del video):</span>
    <select id="offset-sign">
      <option value="1">+</option>
      <option value="-1">−</option>
    </select>
    <input type="number" id="offset-h" min="0" placeholder="hh" class="offset-input" />
    <span>:</span>
    <input type="number" id="offset-m" min="0" max="59" placeholder="mm" class="offset-input" />
    <span>:</span>
    <input type="number" id="offset-s" min="0" max="59" placeholder="ss" class="offset-input" />
    <span>.</span>
    <input type="number" id="offset-ms" min="0" max="999" placeholder="ms" class="offset-input offset-input-ms" />
    <button id="btn-apply-offset">Aplicar desfase</button>
  </div>

  <!-- ÁREA PRINCIPAL -->
  <div class="main-area">

    <!-- COLUMNA IZQUIERDA -->
    <div class="left-panel">
      <div class="words-panel" id="words-panel">
        <div class="words-list" id="words-list">
          <div class="word-row placeholder">
            <span class="word-en">—</span>
            <span class="word-sep">:</span>
            <span class="word-es">esperando subtítulo...</span>
          </div>
        </div>
      </div>

      <div class="translations-panel" id="translations-panel">
        <div class="translation-row">
          <span class="t-label">Traducción literal:</span>
          <span class="t-value" id="t-literal">—</span>
        </div>
        <div class="translation-row alt" id="alt1-row">
          <span class="t-label">Alternativa literal:</span>
          <span class="t-value" id="t-alt1">—</span>
        </div>
        <div class="translation-row alt" id="alt2-row">
          <span class="t-label">Alternativa literal 2:</span>
          <span class="t-value" id="t-alt2">—</span>
        </div>
        <div class="translation-row natural">
          <span class="t-label">Traducción natural:</span>
          <span class="t-value" id="t-natural">—</span>
        </div>
      </div>
    </div>

    <!-- COLUMNA DERECHA: VIDEO -->
    <div class="right-panel">
      <div class="video-wrapper">
        <video id="player" controls></video>
        <div class="subtitle-overlay" id="subtitle-overlay"></div>
        <div class="loading-overlay" id="loading-overlay">
          <div class="spinner"></div>
          <span>Traduciendo...</span>
        </div>
      </div>
    </div>

  </div>

  <!-- BARRA INFERIOR: EXPLICACIONES -->
  <div class="explanation-bar" id="explanation-bar">
    <div class="explanation-block">
      <span class="explanation-label">Explicacion 1 (Gemini):</span>
      <span id="explanation-text-1">—</span>
    </div>
    <div class="explanation-block">
      <span class="explanation-label">Explicacion 2 (Haiku):</span>
      <span id="explanation-text-2">—</span>
    </div>
    <div class="explanation-block">
      <span class="explanation-label">Conceptos relacionados:</span>
      <span id="explanation-text-3">—</span>
    </div>
  </div>

  <!-- PANEL SINCRONIZACIÓN -->
  <div class="sync-controls" id="sync-controls">
    <div class="sync-info">
      <span id="sync-index">—</span>
      <span id="sync-text" class="sync-text">—</span>
    </div>
    <div class="sync-buttons">
      <button id="btn-sub-prev">← Anterior</button>
      <button id="btn-sub-next">Siguiente →</button>
      <button id="btn-sync-done" class="btn-done">✓ Listo</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
